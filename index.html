<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Want To Study? 📚</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#74ebd5,#9face6);
  font-family:Arial, sans-serif;
  overflow:hidden;
  padding:14px;
}

/* Floating books */
.floating{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}
.icon{
  position:absolute;
  bottom:-40px;
  font-size:22px;
  animation:floatUp linear forwards;
}
@keyframes floatUp{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}

.card{
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:min(90vw,420px);
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  position:relative;
  z-index:2;
}

h1{
  color:#333;
  font-size:22px;
  margin:10px 0;
  transition:0.3s;
}

.bear{
  display:block;
  margin:10px auto 8px;
  width:min(220px,65vw);
  animation:bounce 2s infinite ease-in-out;
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.buttonRow{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

#yesBtn{
  background:#4CAF50;
  color:white;
}

#noBtn{
  background:#f44336;
  color:white;
  user-select:none;
}

.message{
  display:none;
  font-size:20px;
  color:#4CAF50;
  font-weight:bold;
  margin-top:12px;
}
</style>
</head>

<body>

<div class="floating" id="floatingLayer"></div>

<div class="card">
  <h1 id="questionText">Do You Want To Study? 📚😏</h1>

  <!-- Funny Study Bear GIF -->
  <img
    id="bearImage"
    class="bear"
    src="https://media.tenor.com/2uyENRmiUt0AAAAi/bear-reading-book.gif"
    alt="Study bear"
  />

  <div class="buttonRow">
    <button id="yesBtn">YES 📖</button>
    <button id="noBtn">NO 😴</button>
  </div>

  <div class="message" id="finalMessage">
    Good student! Let’s study! 💪📚🔥
  </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const questionText = document.getElementById("questionText");
const finalMessage = document.getElementById("finalMessage");
const bearImage = document.getElementById("bearImage");

let noScale = 1;
let yesScale = 1;
let activated = false;
let attempt = 0;

const shrinkStep = 0.12;
const growStep = 0.15;
const minScale = 0.3;

const texts = [
  "Are you sure? 🤨",
  "Homework is waiting 😏",
  "Exam is coming 😈",
  "No escape from study! 📚🔥"
];

function moveNo(){

  if(attempt < texts.length){
    questionText.textContent = texts[attempt];
  } else {
    questionText.textContent = "Press YES or face exam! 😆";
  }
  attempt++;

  yesScale += growStep;
  yesBtn.style.transform = `scale(${yesScale})`;

  if(!activated){
    activated = true;
    const rect = noBtn.getBoundingClientRect();
    noBtn.style.position = "fixed";
    noBtn.style.left = rect.left + "px";
    noBtn.style.top  = rect.top + "px";
  }

  noScale = Math.max(minScale, noScale - shrinkStep);
  noBtn.style.transform = `scale(${noScale})`;

  const rect = noBtn.getBoundingClientRect();
  const pad = 10;

  const maxX = window.innerWidth - rect.width - pad;
  const maxY = window.innerHeight - rect.height - pad;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top  = y + "px";
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", (e)=>{ e.preventDefault(); moveNo(); });
noBtn.addEventListener("touchstart",(e)=>{
  e.preventDefault();
  moveNo();
},{passive:false});

yesBtn.addEventListener("click",()=>{
  questionText.textContent = "Excellent Choice! 🎓✨";
  finalMessage.style.display="block";
  noBtn.style.display="none";
  yesBtn.style.display="none";

  // Change to celebration study GIF
  bearImage.src = "https://media.tenor.com/5bYyZ0XqK5AAAAAi/happy-bear.gif";

  burstIcons();
});

/* Floating books */
const floatingLayer=document.getElementById("floatingLayer");
const icons=["📚","✏️","📝","🎓","📖"];

function spawnIcon(){
  const icon=document.createElement("div");
  icon.className="icon";
  icon.textContent=icons[Math.floor(Math.random()*icons.length)];
  icon.style.left=Math.random()*100+"vw";
  icon.style.animationDuration=(3+Math.random()*3)+"s";
  floatingLayer.appendChild(icon);
  setTimeout(()=>icon.remove(),6000);
}

setInterval(spawnIcon,500);

function burstIcons(){
  for(let i=0;i<25;i++){
    setTimeout(spawnIcon,i*60);
  }
}
</script>

</body>
</html>
